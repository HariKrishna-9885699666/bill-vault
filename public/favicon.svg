<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Indigo rounded background -->
  <rect width="512" height="512" rx="112" fill="#4f46e5"/>

  <!-- Receipt paper (white) -->
  <rect x="120" y="72" width="272" height="344" rx="20" fill="white" opacity="0.97"/>

  <!-- Header accent bar -->
  <rect x="120" y="72" width="272" height="44" rx="20" fill="#4f46e5" opacity="0.08"/>
  <rect x="120" y="96" width="272" height="20" fill="#4f46e5" opacity="0.08"/>

  <!-- Receipt text lines -->
  <rect x="156" y="148" width="200" height="18" rx="9" fill="#4f46e5" opacity="0.4"/>
  <rect x="156" y="184" width="140" height="16" rx="8" fill="#4f46e5" opacity="0.28"/>
  <rect x="156" y="216" width="168" height="16" rx="8" fill="#4f46e5" opacity="0.28"/>
  <rect x="156" y="248" width="112" height="16" rx="8" fill="#4f46e5" opacity="0.22"/>
  <rect x="156" y="280" width="152" height="16" rx="8" fill="#4f46e5" opacity="0.22"/>

  <!-- Divider -->
