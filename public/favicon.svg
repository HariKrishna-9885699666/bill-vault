  <circle cx="360" cy="100" r="26" fill="#4f46e5" opacity="0.12"/>
  <text x="360" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#4f46e5" opacity="0.7">₹</text>

